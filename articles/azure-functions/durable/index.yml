### YamlMime:Landing

title: Durable Task documentation # <60 chars
summary: Durable Task automatically handles retries, state persistence, and crash recovery so you can focus on your business logic. # < 160 chars

metadata:
  title: Durable Task documentation
  description: Durable Task is Microsoft's technology for building workflows and orchestrations as ordinary code that automatically survives failures. Instead of managing complex retry logic, state machines, or message queues, you express your business logic as straightforward functions - Durable Task handles state persistence, automatic recovery, and distributed coordination for you. Workflows can run for hours, days, or even months, reliably resuming from the last completed step after any crash, restart, or redeployment. Common use cases include distributed transactions, multi-agent AI orchestration, data processing pipelines, and infrastructure management. Durable Task encompasses the **[Durable Task SDKs](./choose-orchestration-framework.md)** for self-hosted applications, **[Durable Functions](durable-functions-overview.md)** for serverless hosting on Azure Functions, and the **[Durable Task Scheduler](./durable-task-scheduler/durable-task-scheduler.md)** - a fully managed backend service purpose-built for durable workloads.
  ms.service: azure-functions
  ms.topic: landing-page
  author: hhunter-ms 
  ms.author: hannahhunter 
  ms.date: 12/02/2025 

