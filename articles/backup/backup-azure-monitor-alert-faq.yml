title: Frequently asked questions - Azure Backup Monitoring and Reporting
summary: This article answers common questions about Azure Backup monitoring and reporting.


sections:
  - name: Alerting for backup
    questions:
      - question: |
          What are the different alerting solutions that Azure Backup provides?
        answer: |
          Azure Backup supports multiple alerting options: built-in Azure Monitor alerts, metric alerts, custom Log Analytics-based alerts, custom ARG-based alerts, activity log alerts, and classic alerts. If you're currently using classic alerts, we recommend that you start using Azure Monitor-based alerts because they provide multiple benefits. [Classic alerts will be deprecated and unsupported in the coming years](https://azure.microsoft.com/updates/transition-to-builtin-azure-monitor-alerts-for-recovery-services-vaults-in-azure-backup-by-31-march-2026/). Learn more [about the different alerting options provided by Azure Backup](monitoring-and-alerts-overview.md).

      - question: |
          Are there any costs to use built-in Azure Monitor alerts for Azure Backup?
        answer: |
          With [built-in Azure Monitor alerts](monitoring-and-alerts-overview.md#azure-monitor-alerts-for-azure-backup), alerts for critical operations and failures are generated by default at no additional cost. You can view these alerts in the portal or by using non-portal interfaces. However, to route these alerts to a notification channel, such as email, you incur a minor cost for notifications beyond the free tier of 1,000 emails per month. [Learn more about Azure Monitor pricing](https://azure.microsoft.com/pricing/details/monitor/).

      - question: |
          Are there any costs for using custom alerts (Log Analytics, ARG, activity logs, and metrics) for Azure Backup?
        answer: |
          For [custom alerts](backup-azure-monitoring-alerts.md#supported-alerting-solutions), in addition to the notification costs described above, there is also a cost per alert rule. The cost of the alert rule varies in proportion to the number of dimensions selected as part of the alert rule. [Learn more about Azure Monitor pricing](https://azure.microsoft.com/pricing/details/monitor/).  

      - question: |
          Are there any costs for using metric alerts for Azure Backup?
        answer: |
          With [metric alerts](metrics-overview.md), in addition to the notification costs described above, there is also a cost per alert rule. The cost of the alert rule varies in proportion to the number of dimensions selected as part of the alert rule. [Learn more about Azure Monitor pricing](https://azure.microsoft.com/pricing/details/monitor/).

      - question: |
          What is the difference between alert rules, alert processing rules (action rules), and action groups?
        answer: |
          For backup alerts:

          - **Alert rule**: Refers to a user-created rule that specifies the condition on which an alert should be fired. [Learn more](/azure/azure-monitor/alerts/alerts-overview)
          - **Alert processing rule (earlier called action rule)**: Refers to a user-created rule that specifies the notification channels to which a fired alert is routed. You can also use alert processing rules to suppress notifications for a period of time. [Learn more](/azure/azure-monitor/alerts/alerts-action-rules?tabs=portal)
          - **Action group**: Refers to the notification channel (such as email, ITSM endpoint, logic app, webhook, and so on) that a fired alert can be routed to. [Learn more](/azure/azure-monitor/alerts/action-groups)

          For built-in Azure Monitor alerts, alerts are already generated by default, so you don't need to create an alert rule. To route these alerts to a notification channel, create an alert processing rule and an action group. [See example](backup-azure-monitor-alerts-notification.md#configure-notifications-for-alerts)

          For metric alerts, alerts aren't generated by default, so you first need to create an alert rule to specify the condition under which an alert should fire. To route these alerts to a notification channel, you can directly link the alert rule to an action group, or use an alert processing rule. [See example](backup-azure-monitor-alerts-notification.md#configure-alerts-and-notifications-on-your-metrics)

      - question: |
          Can I configure alerts for successful backup jobs?
        answer: |
          Yes, you can use metric alerts to configure alerts for successful backups. [Learn more](backup-azure-monitor-alerts-notification.md#configure-alerts-and-notifications-on-your-metrics)

      - question: |
          Can I configure notifications programmatically?
        answer: |
          If you use Azure Monitor-based alerts, you can configure notifications ([alert processing rules](/azure/azure-monitor/alerts/alerts-action-rules?tabs=azure-cli) and [action groups](/cli/azure/monitor/action-group)) programmatically. If you use classic alerts, programmatic creation of notifications isn't supported.

      - question: |
          Can Log Analytics-based alerts be delayed?
        answer: |
          After an event occurs, it might take *20 to 30 minutes* for data to reach the Log Analytics workspace. As a result, Log Analytics-based alerts might be slightly delayed. For faster alerting, use built-in [Azure Monitor-based alerts](backup-azure-monitoring-built-in-monitor.md) or [metrics-based alerts](metrics-overview.md).



  - name: Configure Reports for Azure Backup
    questions:
      - question: |
          How do I check if reporting data has started flowing into a Log Analytics (LA) workspace?
        answer: |
          Go to the Log Analytics workspace that you've configured. In the **Logs** menu, run the query `CoreAzureBackup | take 1`. If you see a returned record, data has started flowing into the workspace. The initial data push can take up to 24 hours.

      - question: |
          What is the frequency of data push to a Log Analytics workspace?
        answer: |
          The diagnostic data from the vault is sent to the Log Analytics workspace with some lag. Every event arrives at the Log Analytics workspace 20 to 30 minutes after it's pushed from the Recovery Services vault. Here are more details about the lag:
          
          * Across all solutions, the backup service's built-in alerts are pushed as soon as they're created. So they usually appear in the Log Analytics workspace after 20 to 30 minutes.
          * Across all solutions, on-demand backup jobs and restore jobs are pushed as soon as they finish.
          * For all solutions except SQL backup, scheduled backup jobs are pushed as soon as they finish.
          * For SQL backup, because log backups can occur every 15 minutes, information for all the completed scheduled backup jobs, including logs, is batched and pushed every 6 hours.
          * Across all solutions, other information such as the backup item, policy, recovery points, storage, and so on, is pushed at least once per day.
          * A change in the backup configuration (such as changing policy or editing policy) triggers a push of all related backup information.
          
      - question: |
          How long can I retain reporting data?
        answer: |
          After you create a Log Analytics workspace, you can retain data for a maximum of two years. By default, a Log Analytics workspace retains data for 31 days. [Learn more](/azure/azure-monitor/logs/data-retention-configure?tabs=portal-3%2Cportal-1%2Cportal-2).

      - question: |
          Will I see all my data in reports after I configure the Log Analytics workspace?
        answer: |
          Data starts flowing into the Log Analytics workspace after you configure diagnostic settings. Data is retained in the workspace from the day of configuration for the set retention period. In-progress jobs aren't pushed to the workspace. Events are pushed into the workspace when they complete (success or failure). All data available in the Log Analytics workspace is available in [reports](https://ms.portal.azure.com/#view/Microsoft_Azure_BCDRCenter/AbcCenterMenuBlade/~/reports).

      - question: |
          Can I view reports across vaults and subscriptions?
        answer: |
          Yes, you can view reports across vaults, subscriptions, and regions. Your data might reside in a single Log Analytics workspace or a group of Log Analytics workspaces.

      - question: |
          Can I view reports across tenants?
        answer: |
          If you're an [Azure Lighthouse](https://azure.microsoft.com/services/azure-lighthouse/) user with delegated access to your customers' subscriptions or Log Analytics workspaces, you can use Backup Reports to view data across all your tenants.

      - question: |
          What is the cost of email generated by backup reports through Logic Apps?
        answer: |
          Email reports are a free feature. However, costs for Log Analytics workspaces and Logic Apps (used to configure email) are incurred based on their individual pricing models. Learn [about Azure Monitor pricing](https://azure.microsoft.com/pricing/details/monitor/?cdn=disable).

  - name: Recovery Services vault
    questions:
      - question: |
          How long does it take for the Azure Backup agent job status to reflect in the portal?
        answer: |
          The Azure portal can take up to 15 minutes to reflect the Azure Backup agent job status.

      - question: |
          When a backup job fails, how long does it take to raise an alert?
        answer: |
          An alert is raised within 20 minutes of the Azure Backup failure.

      - question: |
          Is there a case where an email won’t be sent if notifications are configured?
        answer: |
          Yes. In the following situations, notifications aren't sent:
          
          * If notifications are configured hourly and an alert is raised and resolved within the hour.
          * When a job is canceled.
          * If a second backup job fails because the original backup job is in progress.
          
