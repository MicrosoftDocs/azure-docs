### YamlMime:Landing

title: Durable Task SDKs documentation
summary: Durable Task SDKs enable you to build durable, long-running workflows that automatically handle failures and scale across any compute infrastructure.

metadata:
  title: Durable Task SDKs documentation
  description: Durable Task SDKs provide a portable, platform-agnostic way to build durable workflows and orchestrations. Unlike Durable Functions which is serverless on Azure Functions, the SDKs let you host durable applications on any compute platform - Container Apps, Kubernetes, VMs, or on-premises. The SDKs handle state management, automatic retries, and distributed coordination so you can focus on business logic.
  ms.service: durable-task
  ms.subservice: durable-task-sdks
  ms.topic: landing-page
  author: hhunter-ms
  ms.author: hannahhunter
  ms.date: 03/12/2026

