title: Durable Task Scheduler documentation
summary: Durable Task Scheduler is a fully managed backend service purpose-built for durable workloads, providing reliable state management and orchestration coordination.

metadata:
  title: Durable Task Scheduler documentation
  description: Durable Task Scheduler is a fully managed Azure service that provides the backend infrastructure for Durable Functions and Durable Task SDKs. Instead of managing your own storage accounts or queues, Scheduler handles all state persistence, task queuing, and distributed coordination—optimized for high-throughput and long-running workflows. Use Scheduler as your storage provider when you need a managed, scalable, and reliable backend for any Durable Task workload.
  ms.service: durable-task
  ms.subservice: durable-task-scheduler
  ms.topic: landing-page
  author: hhunter-ms
  ms.author: hannahhunter
  ms.date: 03/12/2026

