title: Neon Serverless Postgres FAQ
summary: |
  Answers to common questions about using Neon Serverless Postgres, including features, setup, integration, and management.
sections:
  - name: General
    questions:
      - question: What is Neon Serverless Postgres?
        answer: |
            Neon Serverless Postgres is a cloud-native, serverless, fully managed PostgreSQL database service jointly developed and managed by Microsoft and Neon as an Azure Native Integration. It's designed for modern applications that require rapid scaling, cost optimization, and advanced development workflows.
      - question: What are the key features of Neon Serverless Postgres?
        answer: |
            Neon Serverless Postgres offers several features that set it apart from traditional managed database services: 
            - **Scale-to-Zero**: Automatically scales down to zero when not in use, reducing costs while maintaining instant availability when needed. 
            - **Serverless Autoscaling**: Automatically scales resources based on workload demands without manual intervention. 
            - **Database Branching**: Create isolated copies of a database for testing or development without impacting production data. 
            - **Instant Point-in-Time Restore**: Rapidly recover a database to a previous state for disaster recovery or testing purposes.
      - question: What is Neon Serverless Postgres used for?
        answer: |
            Neon Serverless Postgres is ideal for several use cases: 
            - Web and mobile applications with variable or unpredictable workloads 
            - Development and testing environments that benefit from database branching and instant restore 
            - Scenarios where developers need a fully managed PostgreSQL service with minimal operational overhead 
            - Data analytics and reporting applications that require high availability and performance 
            - Applications that require a serverless database solution with automatic scaling and cost efficiency
      - question: What Postgres versions are supported?
        answer: |
            When you create a Neon project, you can choose from multiple Postgres versions. The available versions are displayed during project creation in the Azure portal on the **Project** tab.
      - question: Where can I learn more about Neon?
        answer: |
            You can explore several resources to learn more about Neon: 
            - [Why Neon?](https://neon.tech/docs/get-started-with-neon/why-neon) 
            - [Developer experience with Neon](https://neon.tech/docs/get-started-with-neon/dev-experience) 
            - [Neon features](https://neon.tech/docs/guides/neon-features) 
            - [Neon pricing](https://neon.tech/pricing)
  - name: Getting started
    questions:
      - question: What are the prerequisites for creating a Neon Serverless Postgres resource?
        answer: |
            To create a Neon Serverless Postgres resource, you need: 
            - An Azure account with an active subscription 
            - A subscription to Neon (available through Azure Marketplace)
      - question: How do I create a Neon Serverless Postgres resource?
        answer: |
            You can create a Neon Serverless Postgres resource through the Azure portal. The creation process includes configuring project details, Azure resource details, organization details, and project settings such as the database name, Postgres version, and project region. For step-by-step instructions, see [Create a Neon Serverless Postgres resource](create.md).
      - question: What is the difference between the Azure resource region and the project region?
        answer: |
            The **Region** setting on the **Basics** tab specifies where your Azure resource is deployed. The **Project region** setting on the **Project** tab specifies where your database is located. These elements are separate configurations, so don't confuse them when setting up your resource.
      - question: What happens when I create my first Neon organization?
        answer: |
            When you create your first Neon organization, a default project is automatically created for you. Each project includes a default branch (called **main**) and a database to help you get started immediately.
  - name: Features and capabilities
    questions:
      - question: What is database branching in Neon?
        answer: |
            Database branching allows you to create a copy-on-write clone of your data. You can create a branch from a current or past state. Each Neon project starts with a root branch called **main**, and you can create other branches from the root branch or from previously created branches. This feature is ideal for testing and development without impacting production data.
      - question: How does scale-to-zero work?
        answer: |
            Neon Serverless Postgres automatically scales down to zero when the database isn't in use, which reduces costs. When activity resumes, the database becomes instantly available again. This serverless architecture ensures you only pay for what you use while maintaining performance when needed.
      - question: How do I connect to a Neon database?
        answer: |
            You can connect clients and applications to a Neon database using a connection string. To generate a connection string, open your project or branch in the Azure portal, select **Connect to database** from the menu bar, verify or select the connection options, and then copy the connection string.
      - question: Can I restore my database to a previous point in time?
        answer: |
            Yes. Neon Serverless Postgres supports instant point-in-time restore, which allows you to rapidly recover a database to a previous state. This feature is useful for disaster recovery or testing purposes.
  - name: Integration and connectivity
    questions:
      - question: How do I connect my Azure app to Neon Serverless Postgres?
        answer: |
            You can use Service Connector, an Azure feature that simplifies connecting Azure resources together. Service Connector manages your connection's network and authentication settings. You can connect apps deployed in Azure App Service, Azure Container Apps, or Azure Kubernetes Service (AKS) to a Neon database. For detailed instructions, see [Connect apps to Neon Serverless Postgres](create-service-connection.md).
      - question: What Azure services does Service Connector support for Neon?
        answer: |
            Service Connector supports connecting Neon Serverless Postgres to apps deployed in Azure App Service, Azure Container Apps, and Azure Kubernetes Service (AKS).
      - question: How do I securely manage database credentials?
        answer: |
            When creating a connection using Service Connector, you can select **Store Secret In Key Vault** to securely store and manage your database credentials in Azure Key Vault. This approach reduces the risk of credential exposure and simplifies secret management.
      - question: What developer tools are available for Neon Serverless Postgres?
        answer: |
            Neon offers several developer tools and guides to help with integration and management: 
            - [Neon CLI](https://neon.tech/docs/reference/neon-cli) 
            - [Neon API](https://api-docs.neon.tech/reference/getting-started-with-neon-api) 
            - [Neon serverless driver](https://neon.tech/docs/serverless/serverless-driver) 
            - [Neon SDKs](https://neon.tech/docs/reference/sdk) 
            - [Terraform providers](https://neon.tech/docs/reference/terraform) 
            - [Framework guides](https://neon.tech/docs/get-started-with-neon/frameworks) 
            - [Language guides](https://neon.tech/docs/get-started-with-neon/languages) 
            - [Integration guides](https://neon.tech/docs/guides/integrations)
      - question: Does Neon support Postgres extensions?
        answer: |
            Yes. Neon supports multiple Postgres extensions. For a complete list of supported extensions, see [Supported Postgres extensions](https://neon.tech/docs/extensions/extensions-intro).
  - name: Management and support
    questions:
      - question: How do I access my Neon account from Azure?
        answer: |
            To access your Neon account, select **Neon Console** from the resource overview pane in the Azure portal. If you don't have a Neon account for your Azure email address, you'll be prompted to configure your account and set a password.
      - question: How do I create more projects?
        answer: |
            To create more projects, go to the resource overview in the Azure portal and select **+ Create Project** from the menu bar. You can specify the project name, Postgres version, database name, and project region.
      - question: Can I tag my Neon resources?
        answer: |
            Yes. You can add tags to your Neon resources during creation on the **Tags** tab, or manage them later through the Azure portal. Tags help you organize and manage your Azure resources.
      - question: How do I delete a Neon resource?
        answer: |
            You can delete a Neon resource from the resource overview pane in the Azure portal. For detailed instructions, see [Manage your Neon integration through the Azure portal](manage.md).
      - question: Where can I get support for Neon Serverless Postgres?
        answer: |
            You can contact [Neon support](https://neon.tech/docs/introduction/support) directly or request support through the Azure portal. In the Azure portal, go to your resource overview and select **Support + Troubleshooting** > **New support request**, then choose the link to log a support request in the Neon portal. 
            You can also join the [Neon Discord server](https://discord.gg/92vNTzKDGp) for community support.
      - question: Where can I find migration guidance?
        answer: |
            If you need to migrate data to Neon Serverless Postgres, see [Migrate data to Neon Serverless Postgres](https://neon.tech/docs/import/migrate-intro) for detailed guidance and best practices.
