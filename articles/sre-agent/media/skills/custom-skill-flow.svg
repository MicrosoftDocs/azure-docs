<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 120">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#0078d4"/>
    </marker>
  </defs>
  
  <rect width="600" height="120" fill="#fafafa"/>
  
  <!-- Agent -->
  <rect x="20" y="40" width="80" height="40" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" filter="url(#shadow)"/>
  <text x="60" y="65" text-anchor="middle" font-family="Segoe UI, Arial" font-size="12" fill="#0d47a1">Agent</text>
  
  <!-- Arrow -->
  <path d="M100 60 L135 60" stroke="#0078d4" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  
  <!-- Custom Skill -->
  <rect x="145" y="40" width="100" height="40" rx="6" fill="#ff8f00" filter="url(#shadow)"/>
  <text x="195" y="65" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="white">Custom Skill</text>
  
  <!-- Arrow -->
  <path d="M245 60 L280 60" stroke="#0078d4" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  
  <!-- Your API -->
  <rect x="290" y="40" width="90" height="40" rx="6" fill="#fff3e0" stroke="#f57c00" stroke-width="2" filter="url(#shadow)"/>
  <text x="335" y="65" text-anchor="middle" font-family="Segoe UI, Arial" font-size="12" fill="#e65100">Your API</text>
  
  <!-- Arrow -->
  <path d="M380 60 L410 60" stroke="#0078d4" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  
  <!-- Returns data -->
  <rect x="420" y="40" width="90" height="40" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" filter="url(#shadow)"/>
  <text x="465" y="65" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#2e7d32">Returns data</text>
  
  <!-- Arrow back -->
  <path d="M510 60 L545 60" stroke="#0078d4" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  
  <!-- Agent -->
  <rect x="555" y="40" width="35" height="40" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" filter="url(#shadow)"/>
  <text x="572" y="65" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#0d47a1">→</text>
</svg>
