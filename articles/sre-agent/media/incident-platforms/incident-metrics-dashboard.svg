<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 200">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <rect width="700" height="200" fill="#fafafa"/>
  
  <!-- Title -->
  <text x="350" y="25" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" font-weight="600" fill="#333">Incident Metrics Dashboard</text>
  
  <!-- KPI Cards Row -->
  <!-- Card 1: Incidents Reviewed -->
  <rect x="20" y="50" width="120" height="80" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" filter="url(#shadow)"/>
  <text x="80" y="75" text-anchor="middle" font-family="Segoe UI, Arial" font-size="24" font-weight="700" fill="#1565c0">247</text>
  <text x="80" y="95" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#1976d2">Incidents</text>
  <text x="80" y="108" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#1976d2">Reviewed</text>
  <text x="80" y="122" text-anchor="middle" font-family="Segoe UI, Arial" font-size="8" fill="#64b5f6">Total processed</text>
  
  <!-- Card 2: Mitigated by Agent -->
  <rect x="155" y="50" width="120" height="80" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" filter="url(#shadow)"/>
  <text x="215" y="75" text-anchor="middle" font-family="Segoe UI, Arial" font-size="24" font-weight="700" fill="#2e7d32">142</text>
  <text x="215" y="95" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#388e3c">Mitigated</text>
  <text x="215" y="108" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#388e3c">by Agent</text>
  <text x="215" y="122" text-anchor="middle" font-family="Segoe UI, Arial" font-size="8" fill="#81c784">Fully autonomous</text>
  
  <!-- Card 3: Assisted by Agent -->
  <rect x="290" y="50" width="120" height="80" rx="8" fill="#fff3e0" stroke="#f57c00" stroke-width="2" filter="url(#shadow)"/>
  <text x="350" y="75" text-anchor="middle" font-family="Segoe UI, Arial" font-size="24" font-weight="700" fill="#e65100">58</text>
  <text x="350" y="95" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#f57c00">Assisted</text>
  <text x="350" y="108" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#f57c00">by Agent</text>
  <text x="350" y="122" text-anchor="middle" font-family="Segoe UI, Arial" font-size="8" fill="#ffb74d">Agent + human</text>
  
  <!-- Card 4: Mitigated by User -->
  <rect x="425" y="50" width="120" height="80" rx="8" fill="#fce4ec" stroke="#c2185b" stroke-width="2" filter="url(#shadow)"/>
  <text x="485" y="75" text-anchor="middle" font-family="Segoe UI, Arial" font-size="24" font-weight="700" fill="#ad1457">32</text>
  <text x="485" y="95" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#c2185b">Mitigated</text>
  <text x="485" y="108" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#c2185b">by User</text>
  <text x="485" y="122" text-anchor="middle" font-family="Segoe UI, Arial" font-size="8" fill="#f48fb1">User-driven</text>
  
  <!-- Card 5: Pending -->
  <rect x="560" y="50" width="120" height="80" rx="8" fill="#fff8e1" stroke="#fbc02d" stroke-width="2" filter="url(#shadow)"/>
  <text x="620" y="75" text-anchor="middle" font-family="Segoe UI, Arial" font-size="24" font-weight="700" fill="#f57f17">15</text>
  <text x="620" y="95" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#fbc02d">Pending</text>
  <text x="620" y="108" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#fbc02d">User Action</text>
  <text x="620" y="122" text-anchor="middle" font-family="Segoe UI, Arial" font-size="8" fill="#ffd54f">Awaiting input</text>
  
  <!-- Progress bar showing autonomy ratio -->
  <rect x="20" y="150" width="660" height="35" rx="6" fill="white" stroke="#e0e0e0" stroke-width="1" filter="url(#shadow)"/>
  <text x="30" y="172" font-family="Segoe UI, Arial" font-size="10" fill="#666">Autonomy Rate:</text>
  
  <!-- Stacked bar -->
  <rect x="120" y="158" width="340" height="18" rx="4" fill="#e8f5e9"/>
  <rect x="120" y="158" width="340" height="18" rx="4" fill="#4caf50"/>
  <rect x="460" y="158" width="80" height="18" fill="#ffb74d"/>
  <rect x="540" y="158" width="40" height="18" rx="0 4 4 0" fill="#ef5350"/>
  
  <text x="290" y="171" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" font-weight="600" fill="white">57% Autonomous</text>
  <text x="500" y="171" text-anchor="middle" font-family="Segoe UI, Arial" font-size="9" fill="white">24%</text>
  
  <text x="600" y="172" font-family="Segoe UI, Arial" font-size="10" fill="#666">→ Track agent effectiveness</text>
</svg>
