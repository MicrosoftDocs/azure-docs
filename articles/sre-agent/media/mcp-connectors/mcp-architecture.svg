<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Segoe UI, sans-serif">
  <!-- Background -->
  <rect width="900" height="520" fill="#fafafa" rx="12"/>
  
  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-size="16" font-weight="600" fill="#1a1a1a">MCP Connector Architecture</text>
  
  <!-- SRE Agent box -->
  <rect x="340" y="55" width="220" height="60" rx="8" fill="#0078d4" opacity="0.1" stroke="#0078d4" stroke-width="1.5"/>
  <text x="450" y="82" text-anchor="middle" font-size="13" font-weight="600" fill="#0078d4">Azure SRE Agent</text>
  <text x="450" y="100" text-anchor="middle" font-size="10" fill="#555">Auto-discovery · Health monitoring · Tool routing</text>
  
  <!-- Streamable-HTTP branch (left) -->
  <line x1="390" y1="115" x2="200" y2="170" stroke="#0078d4" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="270" y="140" font-size="10" fill="#0078d4" font-weight="500">Streamable-HTTP</text>
  
  <!-- Remote MCP servers box -->
  <rect x="30" y="170" width="340" height="160" rx="8" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <text x="200" y="192" text-anchor="middle" font-size="12" font-weight="600" fill="#333">Remote MCP Servers</text>
  
  <!-- Partner cards -->
  <rect x="45" y="205" width="95" height="40" rx="4" fill="#632ca6" opacity="0.08" stroke="#632ca6" stroke-width="1"/>
  <text x="92" y="222" text-anchor="middle" font-size="10" font-weight="500" fill="#632ca6">GitHub</text>
  <text x="92" y="236" text-anchor="middle" font-size="8" fill="#888">PAT (Bearer)</text>
  
  <rect x="150" y="205" width="95" height="40" rx="4" fill="#632ca6" opacity="0.08" stroke="#632ca6" stroke-width="1"/>
  <text x="197" y="222" text-anchor="middle" font-size="10" font-weight="500" fill="#632ca6">Datadog</text>
  <text x="197" y="236" text-anchor="middle" font-size="8" fill="#888">Custom Headers</text>
  
  <rect x="255" y="205" width="95" height="40" rx="4" fill="#632ca6" opacity="0.08" stroke="#632ca6" stroke-width="1"/>
  <text x="302" y="222" text-anchor="middle" font-size="10" font-weight="500" fill="#632ca6">Splunk</text>
  <text x="302" y="236" text-anchor="middle" font-size="8" fill="#888">Bearer Token</text>
  
  <rect x="45" y="255" width="95" height="40" rx="4" fill="#632ca6" opacity="0.08" stroke="#632ca6" stroke-width="1"/>
  <text x="92" y="272" text-anchor="middle" font-size="10" font-weight="500" fill="#632ca6">New Relic</text>
  <text x="92" y="286" text-anchor="middle" font-size="8" fill="#888">Custom Headers</text>
  
  <rect x="150" y="255" width="95" height="40" rx="4" fill="#632ca6" opacity="0.08" stroke="#632ca6" stroke-width="1"/>
  <text x="197" y="272" text-anchor="middle" font-size="10" font-weight="500" fill="#632ca6">Dynatrace</text>
  <text x="197" y="286" text-anchor="middle" font-size="8" fill="#888">Bearer Token</text>
  
  <rect x="255" y="255" width="95" height="40" rx="4" fill="#e8e8e8" stroke="#999" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="302" y="272" text-anchor="middle" font-size="10" font-weight="500" fill="#555">Custom</text>
  <text x="302" y="286" text-anchor="middle" font-size="8" fill="#888">Any URL + Auth</text>
  
  <text x="200" y="320" text-anchor="middle" font-size="9" fill="#666" font-style="italic">Pre-configured URL &amp; auth · Just enter credentials</text>
  
  <!-- Stdio branch (right) -->
  <line x1="510" y1="115" x2="700" y2="170" stroke="#107c10" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="630" y="140" font-size="10" fill="#107c10" font-weight="500">Stdio (local process)</text>
  
  <!-- Local MCP servers box -->
  <rect x="530" y="170" width="340" height="160" rx="8" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <text x="700" y="192" text-anchor="middle" font-size="12" font-weight="600" fill="#333">Local MCP Servers</text>
  
  <!-- Simplified connectors -->
  <rect x="545" y="205" width="145" height="50" rx="4" fill="#107c10" opacity="0.08" stroke="#107c10" stroke-width="1"/>
  <text x="617" y="222" text-anchor="middle" font-size="10" font-weight="500" fill="#107c10">Azure MCP Kusto</text>
  <text x="617" y="236" text-anchor="middle" font-size="8" fill="#888">Managed Identity</text>
  <text x="617" y="248" text-anchor="middle" font-size="7" fill="#aaa">Simplified: Name + MI only</text>
  
  <rect x="705" y="205" width="145" height="50" rx="4" fill="#107c10" opacity="0.08" stroke="#107c10" stroke-width="1"/>
  <text x="777" y="222" text-anchor="middle" font-size="10" font-weight="500" fill="#107c10">EV2 MCP</text>
  <text x="777" y="236" text-anchor="middle" font-size="8" fill="#888">Bundled in container</text>
  <text x="777" y="248" text-anchor="middle" font-size="7" fill="#aaa">15 deployment tools</text>
  
  <rect x="545" y="268" width="305" height="40" rx="4" fill="#e8e8e8" stroke="#999" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="697" y="285" text-anchor="middle" font-size="10" font-weight="500" fill="#555">Custom Stdio Server</text>
  <text x="697" y="299" text-anchor="middle" font-size="8" fill="#888">npx · python · dotnet — Command + Args + Env</text>
  
  <text x="700" y="320" text-anchor="middle" font-size="9" fill="#666" font-style="italic">Agent manages process lifecycle · Auto-restart on failure</text>
  
  <!-- Bottom: Tool flow -->
  <rect x="130" y="365" width="640" height="55" rx="8" fill="#0078d4" opacity="0.05" stroke="#0078d4" stroke-width="1"/>
  <text x="450" y="385" text-anchor="middle" font-size="11" font-weight="600" fill="#0078d4">Tool Discovery &amp; Assignment</text>
  <text x="450" y="402" text-anchor="middle" font-size="10" fill="#555">Auto-discover tools → Namespace as connector_toolname → Assign to subagents (individual or wildcard/*)</text>
  
  <!-- Arrows down to tool flow -->
  <line x1="200" y1="330" x2="300" y2="365" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="700" y1="330" x2="600" y2="365" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
  
  <!-- Bottom: Subagents -->
  <rect x="180" y="440" width="160" height="45" rx="6" fill="#fff" stroke="#0078d4" stroke-width="1"/>
  <text x="260" y="460" text-anchor="middle" font-size="10" font-weight="500" fill="#0078d4">kusto-analyst</text>
  <text x="260" y="475" text-anchor="middle" font-size="8" fill="#888">kusto-mcp/* (7 tools)</text>
  
  <rect x="370" y="440" width="160" height="45" rx="6" fill="#fff" stroke="#0078d4" stroke-width="1"/>
  <text x="450" y="460" text-anchor="middle" font-size="10" font-weight="500" fill="#0078d4">github-researcher</text>
  <text x="450" y="475" text-anchor="middle" font-size="8" fill="#888">github-mcp/* (43 tools)</text>
  
  <rect x="560" y="440" width="160" height="45" rx="6" fill="#fff" stroke="#0078d4" stroke-width="1"/>
  <text x="640" y="460" text-anchor="middle" font-size="10" font-weight="500" fill="#0078d4">monitoring-expert</text>
  <text x="640" y="475" text-anchor="middle" font-size="8" fill="#888">datadog/* + splunk/*</text>
  
  <line x1="350" y1="420" x2="260" y2="440" stroke="#0078d4" stroke-width="1" marker-end="url(#arrow2)"/>
  <line x1="450" y1="420" x2="450" y2="440" stroke="#0078d4" stroke-width="1" marker-end="url(#arrow2)"/>
  <line x1="550" y1="420" x2="640" y2="440" stroke="#0078d4" stroke-width="1" marker-end="url(#arrow2)"/>
  
  <text x="450" y="505" text-anchor="middle" font-size="9" fill="#999">Invoke with /agent slash command in chat · Health monitored every 60s · Deferred loading for late connections</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#666"/>
    </marker>
    <marker id="arrow2" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0078d4"/>
    </marker>
  </defs>
</svg>