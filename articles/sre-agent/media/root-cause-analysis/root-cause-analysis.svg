<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#0078d4"/>
    </marker>
  </defs>
  
  <rect width="600" height="200" fill="#fafafa" rx="8"/>
  
  <!-- Step 1: Symptoms -->
  <rect x="15" y="30" width="90" height="50" rx="6" fill="#ffcdd2" stroke="#c62828" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="60" y="52" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" font-weight="600" fill="#b71c1c">Symptoms</text>
  <text x="60" y="67" text-anchor="middle" font-family="Segoe UI, Arial" font-size="8" fill="#c62828">errors, alerts</text>
  
  <path d="M105 55 L130 55" stroke="#0078d4" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  
  <!-- Step 2: Gather context -->
  <rect x="140" y="30" width="105" height="50" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="192" y="50" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" font-weight="600" fill="#0d47a1">Gather context</text>
  <text x="192" y="65" text-anchor="middle" font-family="Segoe UI, Arial" font-size="8" fill="#1565c0">logs, metrics, deploys</text>
  
  <path d="M245 55 L270 55" stroke="#0078d4" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  
  <!-- Step 3: Form hypotheses -->
  <rect x="280" y="30" width="105" height="50" rx="6" fill="#fff3e0" stroke="#f57c00" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="332" y="50" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" font-weight="600" fill="#e65100">Form hypotheses</text>
  <text x="332" y="65" text-anchor="middle" font-family="Segoe UI, Arial" font-size="8" fill="#f57c00">test &amp; validate</text>
  
  <path d="M385 55 L410 55" stroke="#0078d4" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  
  <!-- Step 4: Root cause -->
  <rect x="420" y="30" width="80" height="50" rx="6" fill="#ff8f00" filter="url(#shadow)"/>
  <text x="460" y="50" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" font-weight="600" fill="white">Root cause</text>
  <text x="460" y="65" text-anchor="middle" font-family="Segoe UI, Arial" font-size="8" fill="#fff8e1">with evidence</text>
  
  <path d="M500 55 L520 55" stroke="#0078d4" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  
  <!-- Step 5: Resolution -->
  <rect x="530" y="30" width="55" height="50" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="557" y="52" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" font-weight="600" fill="#2e7d32">Fix</text>
  <text x="557" y="67" text-anchor="middle" font-family="Segoe UI, Arial" font-size="8" fill="#388e3c">resolve</text>
  
  <!-- Data sources feeding into "Gather context" -->
  <rect x="60" y="110" width="85" height="30" rx="4" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1" filter="url(#shadow)"/>
  <text x="102" y="129" text-anchor="middle" font-family="Segoe UI, Arial" font-size="8" fill="#4a148c">App Insights</text>
  
  <rect x="155" y="110" width="85" height="30" rx="4" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1" filter="url(#shadow)"/>
  <text x="197" y="129" text-anchor="middle" font-family="Segoe UI, Arial" font-size="8" fill="#4a148c">Azure Monitor</text>
  
  <rect x="250" y="110" width="85" height="30" rx="4" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1" filter="url(#shadow)"/>
  <text x="292" y="129" text-anchor="middle" font-family="Segoe UI, Arial" font-size="8" fill="#4a148c">Deployments</text>

  <rect x="345" y="110" width="85" height="30" rx="4" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1" filter="url(#shadow)"/>
  <text x="387" y="129" text-anchor="middle" font-family="Segoe UI, Arial" font-size="8" fill="#4a148c">Source code</text>

  <rect x="440" y="110" width="85" height="30" rx="4" fill="#e8eaf6" stroke="#283593" stroke-width="1" filter="url(#shadow)"/>
  <text x="482" y="129" text-anchor="middle" font-family="Segoe UI, Arial" font-size="8" fill="#1a237e">Memory</text>
  
  <!-- Connectors from data sources up to the flow -->
  <line x1="102" y1="110" x2="192" y2="80" stroke="#7b1fa2" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="197" y1="110" x2="192" y2="80" stroke="#7b1fa2" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="292" y1="110" x2="192" y2="80" stroke="#7b1fa2" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="387" y1="110" x2="332" y2="80" stroke="#7b1fa2" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="482" y1="110" x2="332" y2="80" stroke="#283593" stroke-width="1" stroke-dasharray="3,2"/>
  
  <!-- Label -->
  <text x="300" y="165" text-anchor="middle" font-family="Segoe UI, Arial" font-size="9" fill="#666">Agent queries multiple data sources and correlates evidence to identify root cause</text>
</svg>
