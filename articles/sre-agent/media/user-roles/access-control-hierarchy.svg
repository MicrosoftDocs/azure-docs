<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 340">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="520" height="340" fill="#fafafa" rx="6"/>

  <!-- Layer 1: User Roles -->
  <rect x="30" y="20" width="460" height="55" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
  <text x="260" y="43" text-anchor="middle" font-family="Segoe UI, Arial" font-size="13" fill="#0d47a1" font-weight="600">User Roles</text>
  <text x="260" y="62" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#555">Reader · Standard User · Administrator</text>

  <!-- Arrow -->
  <path d="M260 75 L260 95" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Layer 2: Run Modes -->
  <rect x="30" y="100" width="460" height="55" rx="6" fill="#fff3e0" stroke="#f57c00" stroke-width="1.5"/>
  <text x="260" y="123" text-anchor="middle" font-family="Segoe UI, Arial" font-size="13" fill="#e65100" font-weight="600">Run Modes</text>
  <text x="260" y="142" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#555">Review · Autonomous · ReadOnly — set per trigger / task</text>

  <!-- Arrow -->
  <path d="M260 155 L260 175" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Layer 3: Agent Identity -->
  <rect x="30" y="180" width="460" height="55" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
  <text x="260" y="203" text-anchor="middle" font-family="Segoe UI, Arial" font-size="13" fill="#2e7d32" font-weight="600">Agent Identity</text>
  <text x="260" y="222" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#555">Managed identity with RBAC roles on Azure resources</text>

  <!-- Arrow -->
  <path d="M260 235 L260 255" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Layer 4: OBO Fallback -->
  <rect x="30" y="260" width="460" height="55" rx="6" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1.5"/>
  <text x="260" y="283" text-anchor="middle" font-family="Segoe UI, Arial" font-size="13" fill="#4a148c" font-weight="600">On-Behalf-Of Fallback</text>
  <text x="260" y="302" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#555">Temporary use of Administrator credentials when needed</text>
</svg>
