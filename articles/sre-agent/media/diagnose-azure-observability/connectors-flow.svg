<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0078D4"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="300" fill="#f8f9fa"/>
  
  <!-- User -->
  <g transform="translate(60, 130)">
    <circle cx="30" cy="20" r="20" fill="#0078D4"/>
    <rect x="10" y="45" width="40" height="50" rx="5" fill="#0078D4"/>
    <text x="30" y="120" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="14" fill="#333">User</text>
  </g>
  
  <!-- Arrow 1 -->
  <line x1="130" y1="160" x2="190" y2="160" stroke="#0078D4" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Agent Box -->
  <g transform="translate(200, 100)">
    <rect width="160" height="120" rx="10" fill="#0078D4" opacity="0.1" stroke="#0078D4" stroke-width="2"/>
    <text x="80" y="35" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="16" font-weight="600" fill="#0078D4">SRE Agent</text>
    <text x="80" y="60" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" fill="#666">Reasons &amp; Plans</text>
    <text x="80" y="80" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" fill="#666">Uses Connectors</text>
    <text x="80" y="100" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" fill="#666">Takes Action</text>
  </g>
  
  <!-- Arrow 2 -->
  <line x1="370" y1="160" x2="430" y2="160" stroke="#0078D4" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Connectors Box -->
  <g transform="translate(440, 70)">
    <rect width="140" height="180" rx="10" fill="#107C10" opacity="0.1" stroke="#107C10" stroke-width="2"/>
    <text x="70" y="25" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="14" font-weight="600" fill="#107C10">Connectors</text>
    
    <!-- Connector items -->
    <rect x="15" y="40" width="110" height="22" rx="4" fill="#107C10" opacity="0.2"/>
    <text x="70" y="56" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#107C10">GitHub</text>
    
    <rect x="15" y="68" width="110" height="22" rx="4" fill="#107C10" opacity="0.2"/>
    <text x="70" y="84" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#107C10">Kusto/ADX</text>
    
    <rect x="15" y="96" width="110" height="22" rx="4" fill="#107C10" opacity="0.2"/>
    <text x="70" y="112" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#107C10">Teams</text>
    
    <rect x="15" y="124" width="110" height="22" rx="4" fill="#107C10" opacity="0.2"/>
    <text x="70" y="140" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#107C10">Outlook</text>
    
    <rect x="15" y="152" width="110" height="22" rx="4" fill="#107C10" opacity="0.2"/>
    <text x="70" y="168" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#107C10">MCP Servers</text>
  </g>
  
  <!-- Arrow 3 -->
  <line x1="590" y1="160" x2="650" y2="160" stroke="#0078D4" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- External Systems Box -->
  <g transform="translate(660, 85)">
    <rect width="120" height="150" rx="10" fill="#A4262C" opacity="0.1" stroke="#A4262C" stroke-width="2"/>
    <text x="60" y="25" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="14" font-weight="600" fill="#A4262C">External</text>
    <text x="60" y="42" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="14" font-weight="600" fill="#A4262C">Systems</text>
    
    <text x="60" y="70" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#666">• Repos</text>
    <text x="60" y="88" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#666">• Databases</text>
    <text x="60" y="106" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#666">• Chat channels</text>
    <text x="60" y="124" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#666">• Email</text>
    <text x="60" y="142" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#666">• Custom APIs</text>
  </g>
  
  <!-- Caption -->
  <text x="400" y="280" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" fill="#666">Connectors bridge your agent to the systems where data lives and actions happen</text>
</svg>